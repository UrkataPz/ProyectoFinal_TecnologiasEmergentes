<section class="page">
  <div class="section-title center">
    <span class="badge">Acceso al sistema</span>
    <h1>Iniciar sesión</h1>
    <p>Ingresa con tu correo institucional para acceder a los clubes universitarios.</p>
  </div>

  <form class="card form-card" (ngSubmit)="iniciarSesion()" novalidate>
    <div class="form-group">
      <label for="correo">Correo institucional</label>
      <input
        id="correo"
        name="correo"
        type="email"
        placeholder="ejemplo@unitec.edu"
        [value]="correo()"
        (input)="correo.set($any($event.target).value)"
        [disabled]="isLoading()"
        required
        aria-required="true">
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input
        id="password"
        name="password"
        type="password"
        placeholder="Ingresa tu contraseña"
        [value]="password()"
        (input)="password.set($any($event.target).value)"
        [disabled]="isLoading()"
        required
        aria-required="true">
    </div>

    <button class="btn btn-blue" type="submit"
            [disabled]="isLoading()"
            [attr.aria-busy]="isLoading() ? 'true' : null">
      @if (isLoading()) {
        <span class="spinner" aria-hidden="true"></span>
        Verificando...
      } @else {
        Ingresar
      }
    </button>

    <a class="btn btn-light" routerLink="/registro">
      Crear cuenta nueva
    </a>

    <div role="status" aria-live="polite" aria-atomic="true">
      @if (mensaje()) {
        <p class="notice"
           [class.notice-success]="mensaje().startsWith('✅')"
           [class.notice-error]="mensaje().startsWith('❌')">
          {{ mensaje() }}
        </p>
      }
    </div>
  </form>
</section>
