<section class="page">
  <div class="section-title center">
    <span class="badge">Acceso al sistema</span>
    <h1>Login</h1>
    <p>Vista base para el inicio de sesión de estudiantes, directivos y administradores.</p>
  </div>

  <form class="card form-card" (ngSubmit)="iniciarSesion()">
    <div class="form-group">
      <label for="correo">Correo institucional</label>
      <input 
        id="correo" 
        name="correo" 
        type="email" 
        placeholder="ejemplo@unitec.edu" 
        [(ngModel)]="correo" 
        [disabled]="isLoading"
        required>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input 
        id="password" 
        name="password" 
        type="password" 
        placeholder="Ingrese su contraseña" 
        [(ngModel)]="password" 
        [disabled]="isLoading"
        required>
    </div>

    <button class="btn btn-blue" type="submit" [disabled]="isLoading">
      @if (isLoading) {
        <span class="spinner"></span>
        Verificando...
      } @else {
        Ingresar
      }
    </button>
    
    <a class="btn btn-light" routerLink="/registro" [class.disabled]="isLoading">
      Crear cuenta
    </a>

    @if (mensaje) {
      <p class="notice" [class.notice-success]="mensaje.includes('✅')" [class.notice-error]="mensaje.includes('❌')">
        {{ mensaje }}
      </p>
    }
  </form>
</section>
