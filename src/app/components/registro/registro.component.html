<section class="page">
  <div class="section-title center">
    <span class="badge">Nuevo usuario</span>
    <h1>Registro</h1>
    <p>Formulario base para que los estudiantes puedan crear una cuenta dentro del sistema.</p>
  </div>

  <form class="card form-card" (ngSubmit)="registrar()">
    <div class="form-group">
      <label for="nombre">Nombre completo</label>
      <input id="nombre" name="nombre" type="text" [(ngModel)]="usuario.nombre" placeholder="Nombre del estudiante" required>
    </div>

    <div class="form-group">
      <label for="correo">Correo institucional</label>
      <input id="correo" name="correo" type="email" [(ngModel)]="usuario.correo" placeholder="correo@unitec.edu" required>
    </div>

    <div class="form-group">
      <label for="carrera">Carrera</label>
      <input id="carrera" name="carrera" type="text" [(ngModel)]="usuario.carrera" placeholder="Ej. Ingeniería Informática">
    </div>

    <div class="form-group">
      <label for="rol">Rol inicial</label>
      <select id="rol" name="rol" [(ngModel)]="usuario.rol">
        <option>Estudiante</option>
        <option>Miembro de club</option>
        <option>Directivo</option>
      </select>
    </div>

    <button class="btn btn-blue" type="submit">Registrarme</button>

    @if (mensaje) {
      <p class="notice">{{ mensaje }}</p>
    }
  </form>
</section>
